name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: coursier/setup-action@v3
        with:
          jvm: 11
          apps: sbt
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
          key: sbt-${{ hashFiles('**/build.sbt', '**/build.properties') }}
      - name: Run tests
        run: sbt +compile +test scalastyle
